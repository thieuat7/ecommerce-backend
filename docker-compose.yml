version: '3.8'

services:
  # =========================
  # 1. POSTGRES DATABASE
  # =========================
  postgres-db:
    image: postgres:15-alpine
    container_name: ecommerce_postgres

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # 2. MIGRATION + SEED
  # =========================
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder

    container_name: ecommerce_migrate

    env_file:
      - .env

    command: sh -c "npm run db:setup"

    depends_on:
      postgres-db:
        condition: service_healthy

  # =========================
  # 3. BACKEND NESTJS
  # =========================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder

    container_name: ecommerce_backend

    env_file:
      - .env

    ports:
      - "3000:3000"

    depends_on:
      postgres-db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    command: npm run start:dev

    volumes:
      # - .:/app
      - /app/node_modules

    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - dist/

        - action: rebuild
          path: package.json

    restart: unless-stopped

# =========================
# VOLUMES
# =========================
volumes:
  postgres_data: