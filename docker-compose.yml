version: '3.8'

services:
  # =========================
  # 1. POSTGRES DATABASE
  # =========================
  postgres-db:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # 2. MINIO OBJECT STORAGE
  # =========================
  minio:
    image: minio/minio
    container_name: ecommerce_minio
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    ports:
      - "9000:9000" # Port cho API giao tiếp từ Backend
      - "9001:9001" # Port cho giao diện Web Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # 3. MINIO SETUP (Tự tạo bucket)
  # =========================
  minio-setup:
    image: minio/mc
    container_name: ecommerce_minio_setup
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-password123};
      /usr/bin/mc mb myminio/products --ignore-existing;
      /usr/bin/mc anonymous set download myminio/products;
      exit 0;
      "

  # =========================
  # 4. MIGRATION + SEED
  # =========================
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ecommerce_migrate
    env_file:
      - .env
    command: sh -c "npm run db:setup"
    depends_on:
      postgres-db:
        condition: service_healthy

  # =========================
  # 5. BACKEND NESTJS
  # =========================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ecommerce_backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: npm run start:dev
    volumes:
      # - .:/app
      - /app/node_modules
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: package.json
    restart: unless-stopped

# =========================
# VOLUMES
# =========================
volumes:
  postgres_data:
  minio_data: # Khai báo thêm volume lưu trữ vật lý cho MinIO